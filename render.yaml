services:
  - type: web
    name: mantlepulse
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MANTLE_RPC_URL
        value: https://rpc.sepolia.mantle.xyz
      - key: MANTLE_CHAIN_ID
        value: "5003"
      - key: CONTRACT_ADDRESS
        value: 0x8C78a2d13088EABEcEfe0886E5106046F81dAC03
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SUBGRAPH_URL
        value: https://subgraph-api.mantle.xyz/api/public/d9bf6289-4844-4131-94f1-953497df29e5/subgraphs/nova/uniswap-v3-subgraph/v0.0.1/gn
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: DEPLOYER_PRIVATE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALERT_CHAT_ID
        sync: false
